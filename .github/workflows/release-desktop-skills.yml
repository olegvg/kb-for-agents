name: Release Claude Desktop skills

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Package skills for Claude Desktop
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"

          # Skills shipped to Claude Desktop. kb-distill is intentionally excluded.
          SKILLS=(kb-ingest kb-query kb-lint kb-check-drift)

          # Templates each skill needs copied alongside its SKILL.md.
          declare -A TEMPLATES=(
            [kb-ingest]="_root.template.md index.template.md summary.template.md .kb-state.template.json"
          )

          mkdir -p dist staging

          for skill in "${SKILLS[@]}"; do
            src="skills/$skill"
            stage="staging/$skill"

            if [[ ! -f "$src/SKILL.md" ]]; then
              echo "::error::missing $src/SKILL.md"
              exit 1
            fi

            mkdir -p "$stage"
            cp "$src/SKILL.md" "$stage/SKILL.md"

            if [[ -n "${TEMPLATES[$skill]:-}" ]]; then
              mkdir -p "$stage/templates"
              for t in ${TEMPLATES[$skill]}; do
                cp "templates/$t" "$stage/templates/$t"
              done
              # Rewrite repo-relative template links to point at the bundled copy.
              sed -i 's|\.\./\.\./templates/|templates/|g' "$stage/SKILL.md"
            fi

            zipfile="dist/${skill}-${VERSION}.zip"
            (cd staging && zip -r "../$zipfile" "$skill" >/dev/null)
            (cd dist && sha256sum "${skill}-${VERSION}.zip" >> SHA256SUMS)
            echo "packaged $zipfile"
          done

          ls -la dist/

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip dist/SHA256SUMS --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              dist/*.zip dist/SHA256SUMS
          fi
